<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" fill="none">
  <defs>
    <style>
      .burg { fill: #6B001C; }
      .txt1 {
        fill: #6B001C;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 3px;
      }
      .txt2 {
